<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#06020f">
  <link rel="icon" href="icon.svg?v=440" type="image/svg+xml">
  <title>Ozora 2026 – Cache zurücksetzen</title>
  <style>
    :root{color-scheme:dark;font-family:system-ui,sans-serif;background:#06020f;color:#fffaf3}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 80% 0,#4c1c62,transparent 40%),#06020f}.box{width:min(560px,100%);background:#130a20;border:1px solid #ffffff20;border-radius:22px;padding:24px;box-shadow:0 18px 60px #0009}h1{margin-top:0}p{color:#c8bdd1;line-height:1.5}button,a{display:inline-block;border:0;border-radius:12px;padding:12px 16px;font:inherit;font-weight:800;text-decoration:none}.reset{background:#ff4f76;color:white}.back{background:#281637;color:white;margin-left:6px}#status{color:#ffc857;font-weight:800}
  </style>
</head>
<body>
  <main class="box">
    <div>OZORA 2026 · v4.4</div>
    <h1>Alte App-Version entfernen</h1>
    <p>Dieser Knopf entfernt alte Service Worker und Offline-Caches für mudita1973.github.io. Dein lokal gespeicherter Plan und deine Ratings bleiben erhalten.</p>
    <button class="reset" id="reset">Cache jetzt zurücksetzen</button>
    <a class="back" href="./?v=440">Zur App</a>
    <p id="status" role="status"></p>
  </main>
  <script>
    document.querySelector('#reset').addEventListener('click',async()=>{
      const status=document.querySelector('#status');
      status.textContent='Cache wird entfernt …';
      try{
        if('serviceWorker'in navigator){const registrations=await navigator.serviceWorker.getRegistrations();await Promise.all(registrations.map(registration=>registration.unregister()))}
        if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(key=>caches.delete(key)))}
        status.textContent='Fertig. Die aktuelle App wird geladen …';
        setTimeout(()=>location.replace(`./?fresh=${Date.now()}`),800);
      }catch(error){status.textContent='Zurücksetzen fehlgeschlagen. Bitte die Website-Daten in Safari löschen.'}
    });
  </script>
</body>
</html>
