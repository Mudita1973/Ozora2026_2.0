<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ozora 2026">
<meta name="theme-color" content="#06020f">
<link rel="manifest" href="ozora-manifest.json">

<title>Ozora 2026 – Festival Companion</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:#06020f;
  color:#e8e0f8;
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 20px;
}
.logo {
  width:110px; height:110px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #e11d4844;
  background:#f5f5e8;
  margin-bottom:20px;
  box-shadow:0 0 40px #e11d4822;
}
h1 {
  font-size:32px; font-weight:900; letter-spacing:2px;
  text-transform:uppercase; line-height:1.1;
  background:linear-gradient(90deg,#e11d48,#f59e0b,#10b981);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; text-align:center; margin-bottom:6px;
}
.subtitle {
  font-size:13px; color:#a090d0; letter-spacing:1px;
  text-align:center; margin-bottom:4px;
}
.dates {
  font-size:12px; color:#5a5080; text-align:center; margin-bottom:36px;
}
.lang-title {
  font-size:11px; color:#5a5080; letter-spacing:2px;
  text-transform:uppercase; text-align:center; margin-bottom:16px;
}
.lang-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; width:100%; max-width:320px;
}
.lang-btn {
  display:flex; flex-direction:column; align-items:center;
  gap:6px; padding:18px 12px;
  background:#0d0820; border:1px solid #1e1540;
  border-radius:14px; cursor:pointer;
  text-decoration:none; color:#e8e0f8;
  touch-action:manipulation; transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.lang-btn:hover, .lang-btn:active {
  background:#1a1030; border-color:#e11d48;
  transform:scale(1.03);
}
.lang-flag { font-size:36px; }
.lang-name { font-size:13px; font-weight:700; color:#c4b5fd; }
.lang-native { font-size:11px; color:#5a5080; }
.disclaimer {
  margin-top:32px; font-size:10px; color:#3a3060;
  text-align:center; max-width:300px; line-height:1.6;
}
</style>
</head>
